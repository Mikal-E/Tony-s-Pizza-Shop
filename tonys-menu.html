<!DOCTYPE html>
<html>
    <head>
        <title>Tony's Pizza Shop</title>
        <style>

           .container {

                background-color: lightgray;
                height: 400px;
                padding: 20px;
                
                
           }

           .card {

                background-color: red;
                color: white;
                padding: 20px;
                margin: 10px;
                width: 150px;
                position: relative;        

           }

           .card:first-child {

                position: absolute;
                top: 20px;
                right: 20px

           }

           .badge {

                position: sticky;
                top: 0px;
                right: 20px;
                background-color: darkred;
                color: white;
                padding: 4px 8px;
                font-size: 12px;

           }

        </style>
    </head>
    <body>

        <div class="container">

            <div class="card">Cheese<span class="badge">Popular</span></div>
            <div class="card">Supreme</div>
            <div class="card">Sicilian</div>
   
        </div>
